name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - training_data.csv
  pull_request:
    branches:
      - main
    paths:
      - training_data.csv

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for changes in training_data.csv
        id: check_changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^training_data.csv$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Train Linear Model
        if: steps.check_changes.outputs.changed == 'true'
        run: python train_model.py

      - name: Commit and push linear_model.txt to release branch
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git fetch origin release || true
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git checkout release
            git reset --hard origin/release
          else
            git checkout --orphan release
            git rm -rf .
          fi

          git add linear_model.txt

          if git diff --cached --quiet; then
            echo "No linear_model.txt changes to commit"
          else
            git commit -m "Update linear model"
            git push origin HEAD:release
          fi

      - name: Create GitHub Release
        if: steps.check_changes.outputs.changed == 'true'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: v${{ github.run_number }}
          body: "Automated release generated by CI/CD pipeline."
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./linear_model.txt
          asset_name: linear_model.txt
          asset_content_type: text/plain